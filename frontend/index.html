<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#111;
font-family:Arial;

/* NAVBAR */

position:fixed;

canvas{

/* ========================= */
/* ADD: TITLE BAR STYLE */
/* ========================= */

#titlebar{

position:fixed;

top:50px;

left:0;

display:flex;

/* ========================= */

#titlebar{

position:fixed;

top:0;

left:0;

width:100%;

background:#444;

color:#ffcc00;

justify-content:space-between;

#navbar{

top:40px !important;

canvas{

margin-top:110px !important;

left:50%;

transform:translateX(-50%);

white-space:nowrap;

}

/* ADD: FORCE SHARP IMAGE RENDERING */

canvas {
    /* Stop the browser from interpolating (blurring) the canvas when zoomed */
    image-rendering: -moz-crisp-edges;
    image-rendering: -webkit-crisp-edges;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    
    /* Ensure existing margins are kept */
    display: block;
    margin-top: 110px !important;
}

/* ========================= */
/* NANO GLOW BORDER */
/* ========================= */

:root {
  --neon-cyan: #00f3ff;
  --neon-pink: #bc13fe;
  --bg-dark: #111;
}

.nano-canvas-border {
  position: relative;
  z-index: 0;
  border-radius: 10px;
  overflow: hidden;
  padding: 3px;
}

.nano-canvas-border::before {
  content: "";
  position: absolute;
  z-index: -2;
  left: -50%;
  top: -50%;
  width: 200%;
  height: 200%;
  background-color: var(--bg-dark);
  background-repeat: no-repeat;
  background-size: 50% 50%;
  background-image: conic-gradient(
    transparent,
    var(--neon-cyan),
    transparent 30%
  );
  animation: rotate 4s linear infinite;
}

.nano-canvas-border::after {
  content: "";
  position: absolute;
  z-index: -1;
  left: 3px;
  top: 3px;
  width: calc(100% - 6px);
  height: calc(100% - 6px);
  background: var(--bg-dark);
  border-radius: 8px;
}

@keyframes rotate {
  100% {
    transform: rotate(1turn);
  }
}

</style>

</head>

<body>


<!-- NAVBAR -->

<div id="navbar">

<div class="nav-btn" onclick="showHome()">Home</div>

<div class="nav-btn" onclick="openBuyPixels()">Buy Pixels</div>

<div class="nav-btn" onclick="showFAQ()">FAQ</div>

<div class="nav-btn" onclick="showPixelList()">Pixel List</div>

<div class="nav-btn" onclick="showContact()">Contact</div>

</div>



<div class="nano-canvas-border">
    <canvas id="canvas"></canvas>
</div>



<div id="popup">
<div id="popup-box"></div>
</div>

<!-- ========================= -->
<!-- ADD: TITLE BAR -->
<!-- ========================= -->

<div id="titlebar">

<div id="title-left">
The Million Pixels Homepage™
</div>

<div id="title-right">
1,000,000 pixels • ₹100 per pixel • Own a piece of internet history!

</div>

</div>

<script>

const socket = io("http://127.0.0.1:5000");
const API = "http://127.0.0.1:5000";

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// DISABLING smoothing keeps pixels sharp and prevents the "blurry" look
ctx.imageSmoothingEnabled = false; 
// Webkit/Moz prefixes for older browser compatibility (optional but recommended)
ctx.webkitImageSmoothingEnabled = false;
ctx.mozImageSmoothingEnabled = false;

const popup = document.getElementById("popup");
const popupBox = document.getElementById("popup-box");

let blocks = [];
let images = {};

let selected=null;
let isSelecting=false;
let startX=0;
let startY=0;

/* ========================= */
/* ADD: PAYMENT TOKEN */
/* ========================= */

let uploadToken = null;


/* ========================= */
/* HOMEPAGE */
/* ========================= */

function showHome(){

popupBox.innerHTML=`

<h2>Million Pixels Homepage</h2>

<p>

Welcome to the Million Pixels project.<br><br>

• Select pixels<br>
• Upload your brand image<br>
• Add your website link<br>
• Get permanent visibility<br><br>

Start by clicking Buy Pixels.

</p>

<button class="upload-btn" onclick="openBuyPixels()">Buy Pixels</button>

<button class="cancel-btn" onclick="popup.style.display='none'">Close</button>

`;

popup.style.display="flex";

}

function showFAQ(){

popupBox.innerHTML=`

<h2>Frequently Asked Questions</h2>

<div style="text-align:left;max-height:300px;overflow:auto;">

<b>What is Million Pixels Homepage?</b>
<p>
It is a digital advertising board where you can buy pixels,
upload your brand image, and add your website link permanently.
</p>

<b>How much does each pixel cost?</b>
<p>
Each pixel costs ₹100.
</p>

<b>How long will my image stay?</b>
<p>
Your image will stay permanently.
</p>

<b>Can I change my image later?</b>
<p>
Currently editing is not supported.
</p>

<b>Is payment secure?</b>
<p>
Yes. Payments are handled securely using Razorpay.
</p>

<b>Who developed this website?</b>
<p>
Developed and managed by Adlagatta Mahendra.
</p>

</div>

<button onclick="popup.style.display='none'" class="cancel-btn">
Close
</button>

`;

popup.style.display="flex";

}


function showContact(){

popupBox.innerHTML=`

<h2>Contact</h2>

<p>

Email:<br><br>

<a href="mailto:adlagattamahendra@email.com"
style="color:#00e5b0;">
adlagattamahendra@email.com
</a>

<br><br>

Response within 24 hours.

</p>

<button onclick="popup.style.display='none'"
class="cancel-btn">
Close
</button>

`;

popup.style.display="flex";

}

/* ========================= */
/* PIXEL LIST */
/* ========================= */

function showPixelList(){

let html=`<h2>Pixel Owners</h2>
<div style="max-height:300px;overflow:auto;">`;

if(blocks.length===0){

html+=`<p>No pixels sold yet</p>`;

}else{

blocks.forEach(b=>{

html+=`

<div style="
padding:8px;
margin:5px;
background:#111;
border-radius:5px;
border:1px solid #00e5b0;
">

<b>${b.name}</b><br>

${b.link ? `<small>${b.link}</small>` : ``}

</div>

`;

});

}

html+=`</div>

<button class="cancel-btn" onclick="popup.style.display='none'">Close</button>
`;

popupBox.innerHTML=html;
popup.style.display="flex";

}


/* ========================= */
/* RESIZE */
/* ========================= */

function resize(){

const ratio = window.devicePixelRatio || 1;

canvas.width = window.innerWidth * ratio;
canvas.height = window.innerHeight * ratio;

canvas.style.width = window.innerWidth + "px";
canvas.style.height = window.innerHeight + "px";

ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

draw();

canvas.style.cursor = "crosshair";

}

resize();
window.addEventListener("resize",resize);


/* ========================= */
/* LOAD */
/* ========================= */

async function load(){

const res=await fetch(API+"/blocks");
const data=await res.json();

blocks=data.blocks||[];

updatePixelCounter();
preload();

}

socket.on("updated",load);
load();


/* ========================= */
/* PIXEL COUNTER */
/* ========================= */

function updatePixelCounter(){

let sold = 0;

blocks.forEach(b=>{

const w = parseInt(b.width);
const h = parseInt(b.height);

if(!isNaN(w) && !isNaN(h)){
sold += w * h;
}

});

const total = 1000000;

const available = total - sold;

document.getElementById("title-right").innerHTML = `
1,000,000 pixels • ₹100 per pixel • Own a piece of internet history!
<br>
<span style="color:#00e5b0;">
Sold: ${sold.toLocaleString()} pixels
</span>
&nbsp;&nbsp;|&nbsp;&nbsp;
<span style="color:#fff;">
Available: ${available.toLocaleString()} pixels
</span>
`;

}


/* ========================= */
/* PRELOAD */
/* ========================= */

function preload() {
    let count = 0;
    if (blocks.length === 0) { draw(); return; }

    blocks.forEach(b => {
        const img = new Image();

        // Handle URLs
        if (b.image.startsWith("http")) {
            img.src = b.image;
        } else {
            const cleanPath = b.image.startsWith("/") ? b.image.slice(1) : b.image;
            img.src = API + "/" + cleanPath;
        }

        // REMOVED: img.crossOrigin = "Anonymous";  <-- This was causing the CORS block

        img.onload = () => {
            images[b.image] = img;
            count++;
            if (count === blocks.length) draw();
        };

        img.onerror = () => {
            console.error("Failed to load:", img.src);
            count++;
            if (count === blocks.length) draw();
        };
    });
}
/* ========================= */
/* DRAW */
/* ========================= */

/* ========================= */
/* DRAW */
/* ========================= */

function draw() {
    // Clear the canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw white background
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. DRAW ALL UPLOADED BLOCKS
    blocks.forEach(b => {
        const img = images[b.image];

        if (img) {
            // FIX: Use standard drawImage to FORCE the image to fill the selected pixels.
            // This ensures the customer gets exactly the size they paid for.
            ctx.drawImage(
                img,
                Math.floor(b.minCol),
                Math.floor(b.minRow),
                Math.floor(b.width),
                Math.floor(b.height)
            );
        }
    });

    // 2. DRAW SELECTION BOX (IF ACTIVE)
    if (selected) {
        /* glow effect */
        ctx.shadowColor = "#00f3ff";
        ctx.shadowBlur = 20;

        ctx.fillStyle = "rgba(0,255,255,0.3)";
        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 2;

        ctx.fillRect(
            selected.minCol,
            selected.minRow,
            selected.width,
            selected.height
        );

        ctx.strokeRect(
            selected.minCol,
            selected.minRow,
            selected.width,
            selected.height
        );

        /* reset glow */
        ctx.shadowBlur = 0;
    }
}

/* ========================= */
/* SELECT & INTERACTION */
/* ========================= */

// Helper to get exact canvas coordinates
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

let isDragging = false;

/* 1. MOUSE DOWN - Start Selection */
canvas.addEventListener("mousedown", function(e) {
  const pos = getMousePos(e);
  
  isSelecting = true;
  isDragging = false; // Reset drag status
  
  startX = pos.x;
  startY = pos.y;

  selected = {
    minCol: startX,
    minRow: startY,
    width: 0,
    height: 0
  };

  draw();
});

/* 2. MOUSE MOVE - Update Cursor & Selection Box */
canvas.addEventListener("mousemove", function(e) {
  const pos = getMousePos(e);

  /* A. Handle Cursor Hover Style */
  let hover = false;
  for (let b of blocks) {
    if (
      pos.x >= b.minCol &&
      pos.x <= b.minCol + b.width &&
      pos.y >= b.minRow &&
      pos.y <= b.minRow + b.height
    ) {
      hover = true;
      break;
    }
  }
  canvas.style.cursor = hover ? "pointer" : "crosshair";

  /* B. Handle Dragging Selection */
  if (isSelecting) {
    selected.width = pos.x - startX;
    selected.height = pos.y - startY;

    // If moved significantly, mark as a drag operation
    if (Math.abs(selected.width) > 2 || Math.abs(selected.height) > 2) {
      isDragging = true;
    }

    draw();
  }
});

/* 3. MOUSE UP - Finalize Selection */
canvas.addEventListener("mouseup", function() {
  isSelecting = false;

  // Fix negative width/height (drawing backwards)
  if (selected.width < 0) {
    selected.minCol += selected.width;
    selected.width = Math.abs(selected.width);
  }

  if (selected.height < 0) {
    selected.minRow += selected.height;
    selected.height = Math.abs(selected.height);
  }

  draw();
});

/* 4. CLICK - Open Link OR Create Default Block */
canvas.addEventListener("click", function(e) {
  const pos = getMousePos(e);

  // Check if clicked on a sold block
  let foundBlock = null;
  for (let b of blocks) {
    if (
      pos.x >= b.minCol &&
      pos.x <= b.minCol + b.width &&
      pos.y >= b.minRow &&
      pos.y <= b.minRow + b.height
    ) {
      foundBlock = b;
      break;
    }
  }

  if (foundBlock) {
    // If clicked a sold block, open the popup
    popupBox.innerHTML = `
      <h2>${foundBlock.name}</h2>
      
      <button class="upload-btn" onclick="
        let url='${foundBlock.link}';
        if(url && !url.startsWith('http')) url='https://'+url;
        window.open(url,'_blank');
      ">
      Visit Website
      </button>

      <button class="cancel-btn" onclick="popup.style.display='none'">
      Close
      </button>
    `;
    popup.style.display = "flex";
    
    selected = null; // Deselect to hide the selection box
    draw();
    return;
  }

  // If clicked empty space AND didn't drag, create a default 10x10 block
  if (!isDragging && !foundBlock) {
    const DEFAULT_SIZE = 10;
    selected = {
      minCol: pos.x - (DEFAULT_SIZE / 2),
      minRow: pos.y - (DEFAULT_SIZE / 2),
      width: DEFAULT_SIZE,
      height: DEFAULT_SIZE
    };
    draw();
  }
});

/* ========================= */
/* BUY POPUP */
/* ========================= */

function openBuyPixels(){

if(!selected){
alert("Select pixels first");
return;
}

const pixels = Math.floor(selected.width) * Math.floor(selected.height);
const price = pixels * 100;

popupBox.innerHTML=`

<h2>Upload Your Block</h2>

Selected Pixels: <b>${pixels}</b><br>
Price: <b style="color:#00e5b0;">₹${price}</b>

<input id="name" placeholder="Brand Name">

<input id="link" placeholder="Website">

<input type="file" id="file">

<br>

<button class="upload-btn" onclick="payNow()">Pay & Upload</button>
<button class="cancel-btn" onclick="popup.style.display='none'">Cancel</button>

`;

popup.style.display="flex";

}


/* ========================= */
/* SECURE PAYMENT */
/* ========================= */

async function payNow(){

if(!selected){
alert("Select pixels first");
return;
}

const pixels = Math.floor(selected.width) * Math.floor(selected.height);
const amount = pixels * 100;

const orderRes = await fetch(API+"/create-order",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({ amount })

});

const order = await orderRes.json();

const options = {

key: "YOUR_KEY_ID",

amount: order.amount,

currency: "INR",

order_id: order.id,

handler: async function(response){

const verifyRes = await fetch(API+"/verify-payment",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify(response)

});

const verify = await verifyRes.json();

if(verify.success){

uploadToken = verify.token;

alert("Payment Verified");

upload();

}else{

alert("Payment Failed");

}

}

};

const rzp = new Razorpay(options);
rzp.open();

}


/* ========================= */
/* SECURE UPLOAD */
/* ========================= */

async function upload(){

if(!uploadToken){
alert("Payment not verified");
return;
}

const name=document.getElementById("name").value;
const link=document.getElementById("link").value;
const file=document.getElementById("file").files[0];

if(!name.trim()){

alert("Brand name required");
return;

}

if(!file){

alert("Image required");
return;

}

const fd=new FormData();

fd.append("file", file);
fd.append("token", uploadToken);

const up=await fetch(API+"/upload",{

method:"POST",
body:fd

});

const data=await up.json();

await fetch(API+"/save",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

image:data.url,
name,
link,
...selected,
token:uploadToken

})

});

<!-- popup.style.display="none"; -->

load();

}

function drawImageProp(ctx, img, x, y, w, h, offsetX, offsetY) {
    if (arguments.length === 2) {
        x = y = 0;
        w = ctx.canvas.width;
        h = ctx.canvas.height;
    }

    // Default offset is center
    offsetX = typeof offsetX === "number" ? offsetX : 0.5;
    offsetY = typeof offsetY === "number" ? offsetY : 0.5;

    // Keep bounds [0.0, 1.0]
    if (offsetX < 0) offsetX = 0;
    if (offsetY < 0) offsetY = 0;
    if (offsetX > 1) offsetX = 1;
    if (offsetY > 1) offsetY = 1;

    var iw = img.width,
        ih = img.height,
        r = Math.min(w / iw, h / ih),
        nw = iw * r,   // new prop. width
        nh = ih * r,   // new prop. height
        cx, cy, cw, ch, ar = 1;

    // Calculate center shift
    cx = (w - nw) * offsetX;
    cy = (h - nh) * offsetY;

    // Draw the image centered
    // optional: ctx.fillStyle = "#000"; 
    // optional: ctx.fillRect(x, y, w, h); // Fill background black if aspect ratio differs
    
    ctx.drawImage(img, x + cx, y + cy, nw, nh);
}
</script>

</body>
</html>
